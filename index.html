<script>

const all=[...(window.vol1||[]),...(window.vol2||[]),...(window.vol3||[]),...(window.vol4||[]),...(window.vol5||[]),...(window.vol6||[]),...(window.vol7||[]),...(window.vol8||[])];

let selected=[],pool=[],index=0,correct=0,answered=[];
let wrongQuestions=[];
let currentWrong=[];
let retryMode=false;
let quizMode="text";
let choiceHintLevel=0;

let stats=JSON.parse(localStorage.getItem("cocktailStats")||'{"plays":0,"correct":0,"wrong":0,"vol":{}}');

function showStats(){
let rate=(stats.correct+stats.wrong)>0?Math.round(stats.correct/(stats.correct+stats.wrong)*100):0;
let volHtml="";
for(let i=1;i<=8;i++){
 const v=stats.vol[i]||{correct:0,total:0};
 const vr=v.total?Math.round(v.correct/v.total*100):0;
 volHtml+=`<div class="card">Vol${i}: ${v.correct}/${v.total} (${vr}%)</div>`;
}
document.getElementById("app").innerHTML=`
<h1>成績表</h1>
<div class="card">総プレイ回数: ${stats.plays}</div>
<div class="card">総正解数: ${stats.correct}</div>
<div class="card">総不正解数: ${stats.wrong}</div>
<div class="card">総合正答率: ${rate}%</div>
${volHtml}
<button onclick="home()">トップ画面</button>
<button onclick="resetStats()">成績リセット</button>
`;
}


function resetStats(){
if(confirm(
"成績をリセットします。\n\n"+
"・総プレイ回数\n"+
"・総正解数\n"+
"・総不正解数\n"+
"・Vol別成績\n"+
"・総合正答率\n\n"+
"この操作は元に戻せません。\n\n"+
"本当にリセットしますか？"
)){
stats={plays:0,correct:0,wrong:0,vol:{}};
localStorage.setItem("cocktailStats",JSON.stringify(stats));
showStats();
}
}

function home(){
document.getElementById("app").innerHTML=`
<h1>Cocktail Study</h1>
${[
{v:1,n:"Vol1（定番）"},
{v:2,n:"Vol2（ジン）"},
{v:3,n:"Vol3（ウォッカ）"},
{v:4,n:"Vol4（ラム・テキーラ）"},
{v:5,n:"Vol5（ブランデー・ウイスキー）"},
{v:6,n:"Vol6（ワイン）"},
{v:7,n:"Vol7（リキュール）"},
{v:8,n:"Vol8（ビア・ソフト）"}
].map(x=>`<label><input type="checkbox" class="vol" value="${x.v}" checked>${x.n}</label><br>`).join("")}
<button onclick="clearVol()">チェックボックスを全て外す</button>
<button onclick="start()">順番学習</button>
<button onclick="startChoiceMode()">十択学習</button>
<button onclick="showRecipeVolumes()">レシピ表</button>
<button onclick="showStats()">成績表</button>`;
}


function startChoiceMode(){
quizMode="choice";
selected=[...document.querySelectorAll(".vol:checked")].map(x=>Number(x.value));
pool=all.filter(x=>selected.includes(Number(x.vol)));
index=0;
correct=0;
answered=[];
wrongQuestions=[];
currentWrong=[];
retryMode=false;
if(pool.length===0){alert("Volを選択してください");return;}
stats.plays++;
localStorage.setItem("cocktailStats",JSON.stringify(stats));
showChoiceQuestion();
}


function clearVol(){
document.querySelectorAll(".vol").forEach(v=>v.checked=false);
}

function start(){
selected=[...document.querySelectorAll(".vol:checked")].map(x=>Number(x.value));
pool=all.filter(x=>selected.includes(Number(x.vol)));
index=0;
correct=0;
answered=[];
wrongQuestions=[];
currentWrong=[];
retryMode=false;
stats.plays++;
localStorage.setItem("cocktailStats",JSON.stringify(stats));
if(pool.length===0){alert("Volを選択してください");return;}
show();
}

function normalize(s){
return s.toLowerCase()
.replace(/cc/g,"")
.replace(/[、,\s　]/g,"");
}

function show(){
const q=pool[index];
document.getElementById("app").innerHTML=`
<button onclick="home()">トップ画面</button>
<button onclick="back()">戻る</button>
<div>${index+1}/${pool.length}</div>
<h2>問題</h2>
<h1>${q.name}</h1>
<input id="answer" placeholder="レシピを入力">
<button id="hintButton" onclick="showHint()">ヒント（グラス表示）</button>
<div id="hintArea"></div>
<button id="answerButton" onclick="judge()">解答する</button>`;
}


function showHint(){
const q=pool[index];
document.getElementById("hintArea").innerHTML=`
<p>グラス: ${q.glass}</p>
`;
}

function judge(){
if(answered[index]) return;

const q=pool[index];
const user=normalize(document.getElementById("answer").value);

const tokens=q.recipe.split("、").map(x=>normalize(x));
const ok=tokens.every(t=>user.includes(t));

answered[index]=true;

stats.plays = stats.plays || 0;
stats.correct = stats.correct || 0;
stats.wrong = stats.wrong || 0;
if(!stats.vol[q.vol]) stats.vol[q.vol]={correct:0,total:0};

stats.vol[q.vol].total++;

if(ok){
    correct++;
    stats.correct++;
    stats.vol[q.vol].correct++;
}else{
    currentWrong.push(q);
    stats.wrong++;
}

localStorage.setItem("cocktailStats",JSON.stringify(stats));

document.getElementById("answer").style.display="none";
document.getElementById("hintButton").style.display="none";
document.getElementById("answerButton").style.display="none";

document.getElementById("app").innerHTML+=`
<hr>
<h2>${ok?"⭕ 正解":"❌ 不正解"}</h2>
<p>正解: ${q.recipe}</p>
<p>グラス: ${q.glass}</p>
<p>付属: ${q.garnish||"なし"}</p>
<p>${q.history||""}</p>
<button onclick="next()">次の問題</button>`;
}

function next(){
index++;
if(index>=pool.length){
wrongQuestions=[...currentWrong];
document.getElementById("app").innerHTML=`
<h1>${retryMode?"再挑戦結果":"採点結果"}</h1>
<p>${pool.length}問中 ${correct}問正解</p>
<p>正答率 ${Math.round(correct/pool.length*100)}%</p>
<button onclick="home()">トップ画面</button>
${(wrongQuestions.length>0)?`<button onclick="retryWrong()">不正解${wrongQuestions.length}問を再挑戦</button>`:""}
`;
return;
}
show();
}

function back(){

    if(index===0){
        alert("1問目の問題です");
        return;
    }

    const prevQuestion = pool[index-1];

    if(answered[index-1]){

        answered[index-1]=false;

        if(stats.vol[prevQuestion.vol]){
            stats.vol[prevQuestion.vol].total--;
        }

        const wasWrong=currentWrong.find(
            q=>q.name===prevQuestion.name
        );

        if(wasWrong){
            stats.wrong--;
            currentWrong=currentWrong.filter(
                q=>q.name!==prevQuestion.name
            );
        }else{
            stats.correct--;
            if(stats.vol[prevQuestion.vol]){
                stats.vol[prevQuestion.vol].correct--;
            }
            correct--;
        }

        localStorage.setItem(
            "cocktailStats",
            JSON.stringify(stats)
        );
    }

    index--;
    if(quizMode==="choice"){
        showChoiceQuestion();
    }else{
        show();
    }
}


function retryWrong(){
pool=[...wrongQuestions];
index=0;
correct=0;
answered=[];
currentWrong=[];
retryMode=true;
show();
}


function shuffle(a){
 return [...a].sort(()=>Math.random()-0.5);
}

function showChoiceQuestion(){
 const q=pool[index];
 choiceHintLevel=0;
 const correctRecipe=q.recipe.split("、");
 let materials=[...correctRecipe];

 all.forEach(x=>{
   x.recipe.split("、").forEach(r=>{
      if(!materials.includes(r)) materials.push(r);
   });
 });

 materials=shuffle(materials).slice(0,10-correctRecipe.length).concat(correctRecipe);
 materials=shuffle(materials);

 document.getElementById("app").innerHTML=`
 <button onclick="home()">トップ画面</button>
 <button onclick="back()">戻る</button>
 <div>${index+1}/${pool.length}</div>
 <h2>問題</h2>
 <h1>${q.name}</h1>
 <button onclick="showChoiceHint()">ヒント</button>
 <div id="choiceHintArea"></div>
 <p>材料を選択してください</p>
 ${materials.map((m,i)=>`<label><input type="checkbox" class="mat" value="${m}">${m}</label><br>`).join("")}
 <button onclick="judgeChoice()">決定</button>`;
}


function showChoiceHint(){
 const q=pool[index];
 choiceHintLevel++;
 let base=q.recipe.split("、")[0];

 if(choiceHintLevel===1){
   document.getElementById("choiceHintArea").innerHTML=`<div class="card">グラス: ${q.glass}</div>`;
 }else if(choiceHintLevel===2){
   document.getElementById("choiceHintArea").innerHTML=`<div class="card">グラス: ${q.glass}<br>付属: ${q.garnish||"なし"}</div>`;
 }else{
   document.getElementById("choiceHintArea").innerHTML=`<div class="card">グラス: ${q.glass}<br>付属: ${q.garnish||"なし"}<br>ベース: ${base}</div>`;
 }
}


function judgeChoice(){
 const q=pool[index];
 const selectedMat=[...document.querySelectorAll(".mat:checked")].map(x=>x.value);
 const answer=q.recipe.split("、");
 const ok=answer.length===selectedMat.length && answer.every(x=>selectedMat.includes(x));

 document.getElementById("app").innerHTML+=`
 <hr>
 <h2>${ok?"⭕ 正解":"❌ 不正解"}</h2>
 <p>正解:${q.recipe}</p>
 <p>付属:${q.garnish||"なし"}</p>
 <button onclick="nextChoice()">次の問題</button>`;
 if(ok) correct++;
}

function nextChoice(){
 index++;
 if(index>=pool.length){home();return;}
 showChoiceQuestion();
}


function showRecipeVolumes(){
 document.getElementById("app").innerHTML=`
 <h1>レシピ表</h1>
 <button onclick="showRecipeVol(1)">Vol1（定番）</button>
 <button onclick="showRecipeVol(2)">Vol2（ジン）</button>
 <button onclick="showRecipeVol(3)">Vol3（ウォッカ）</button>
 <button onclick="showRecipeVol(4)">Vol4（ラム・テキーラ）</button>
 <button onclick="showRecipeVol(5)">Vol5（ブランデー・ウイスキー）</button>
 <button onclick="showRecipeVol(6)">Vol6（ワイン）</button>
 <button onclick="showRecipeVol(7)">Vol7（リキュール）</button>
 <button onclick="showRecipeVol(8)">Vol8（ビア・ソフト）</button>
 <button onclick="home()">トップ画面</button>`;
}

function showRecipeVol(v){
 const list=all.filter(x=>x.vol===v);
 document.getElementById("app").innerHTML=`
 <h1>Vol${v} レシピ表</h1>
 ${list.map(x=>`
 <div class="card">
   <h3>${x.name}</h3>
   <div><b>レシピ</b><br>${x.recipe}</div>
   <div><b>グラス</b> ${x.glass}</div>
   <div><b>付属</b> ${x.garnish||"なし"}</div>
   <div style="margin-top:10px;line-height:1.6;text-align:left;">
      <b>解説</b><br>
      ${x.detailHistory || x.history || "解説未登録"}
   </div>
 </div>`).join("")}
 <button onclick="showRecipeVolumes()">Vol一覧へ戻る</button>
 <button onclick="home()">トップ画面</button>`;
}

window.onload=home;

</script>
